version: "3.9"
services:
  mysql:
    image: mysql:8.0
    container_name: smkinteraktif-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: smkinteraktif
      MYSQL_USER: smkinteraktif
      MYSQL_PASSWORD: Abd1dalem
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  adminer:
    image: adminer
    container_name: smkinteraktif-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - mysql

volumes:
  mysql_data:
